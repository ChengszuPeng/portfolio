<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>Meta</title>

  <link rel="stylesheet" href="../style.css" />

  <script type="module" src="../global.js"></script>

  <script type="module" src="main.js"></script>

  <style>
    #filter {
      margin-block: 1rem;
    }

    #filter label {
      display: flex;

      align-items: baseline;

      gap: 1rem;

      width: 100%;
    }

    #commit-progress {
      flex: 1;
    }

    #commit-time {
      margin-left: auto;

      font-weight: bold;
    }

    #files {
      display: grid;

      grid-template-columns: 1fr 4fr;

      gap: 0.5rem;

      margin-block: 2rem;
    }

    #files > div {
      grid-column: 1 / -1;

      display: grid;

      grid-template-columns: subgrid;
    }

    #files dt {
      grid-column: 1;
    }

    #files dd {
      grid-column: 2;

      display: flex;

      flex-wrap: wrap;

      align-items: start;

      align-content: start;

      gap: 0.15em;

      padding-top: 0.6em;

      margin-left: 0;
    }

    dt small {
      display: block;

      opacity: 0.7;

      font-size: 0.8em;

      margin-top: 0.25em;
    }

    .loc {
      display: flex;

      width: 0.5em;

      aspect-ratio: 1;

      background: var(--color);

      border-radius: 50%;
    }

    #scrolly-1 {
      position: relative;

      display: flex;

      gap: 1rem;
    }

    #scrolly-1 > * {
      flex: 1;
    }

    #scatter-story {
      position: relative;
    }

    #scatter-plot {
      position: sticky;

      top: 0;

      left: 0;

      bottom: auto;

      height: 50vh;
    }
  </style>
</head>

<body>
  <h1>Meta</h1>

  <p>
    This page includes stats about the code of this website.
  </p>

  <div id="filter">
    <label>
      Show commits until:

      <input
        type="range"
        id="commit-progress"
        min="0"
        max="100"
        value="100"
      />

      <time id="commit-time"></time>
    </label>
  </div>

  <div id="stats"></div>

  <div id="scrolly-1">

    <div id="scatter-story">
      <p>Scroll to explore the commit history.</p>
    </div>

    <div id="scatter-plot">

      <h2>Commits by time of day</h2>

      <div id="chart"></div>

      <p id="selection-count">
        No commits selected
      </p>

      <dl
        id="language-breakdown"
        class="stats"
      ></dl>

    </div>

  </div>

  <dl id="files"></dl>

  <dl
    id="commit-tooltip"
    class="info tooltip"
    hidden
  >
    <dt>Commit</dt>

    <dd>
      <a
        href=""
        id="commit-link"
        target="_blank"
      ></a>
    </dd>

    <dt>Date</dt>

    <dd id="commit-date"></dd>
  </dl>

</body>
</html>
